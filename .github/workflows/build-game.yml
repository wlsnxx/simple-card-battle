name: Build Game

on:
  # No template os builds rodam só manualmente — num jogo real,
  # reative o gatilho de push na main para release automática:
  #   push:
  #     branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Version — calculada uma vez, usada por builds e release
  # ─────────────────────────────────────────────
  version:
    name: 🔢 Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      version_name: ${{ steps.calc.outputs.version_name }}
      version_code: ${{ steps.calc.outputs.version_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calc
        run: |
          LATEST=$(git tag -l "v*.*.*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "version_name=${NEXT#v}" >> "$GITHUB_OUTPUT"
          # run_number é monotônico — serve como Android versionCode
          echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Next release: $NEXT (code ${{ github.run_number }})"

  # ─────────────────────────────────────────────
  # Android — Ubuntu runner
  # Assina release quando os secrets ANDROID_KEYSTORE_* existem;
  # caso contrário cai no build debug (keystore efêmera).
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Build Android
    runs-on: ubuntu-latest
    needs: version
    env:
      HAS_RELEASE_KS: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
      ANDROID_KEYSTORE_USER: ${{ secrets.ANDROID_KEYSTORE_USER }}
      ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
      VERSION_NAME: ${{ needs.version.outputs.version_name }}
      VERSION_CODE: ${{ needs.version.outputs.version_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Generate Android debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -dname "CN=Debug,O=Indie,C=BR" \
            -keyalg RSA -keysize 2048 -validity 10000

      - name: Restore release keystore (secrets configurados)
        if: env.HAS_RELEASE_KS == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > ~/.android/release.keystore
          echo "Release keystore restaurada — o APK será assinado para release"

      - name: Cache Godot binary and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/godot
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-${{ env.GODOT_VERSION }}-stable-linux

      - name: Download Godot ${{ env.GODOT_VERSION }} (Linux)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip /tmp/godot.zip -d /tmp/godot-bin
          mv "/tmp/godot-bin/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" ~/.local/bin/godot
          chmod +x ~/.local/bin/godot

      - name: Download Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" \
            -O /tmp/export_templates.tpz
          unzip /tmp/export_templates.tpz -d /tmp/export_templates_extracted
          mv /tmp/export_templates_extracted/templates/* \
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Configure Godot editor settings (Android SDK)
        run: |
          mkdir -p ~/.config/godot
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '' \
            '[resource]' \
            "export/android/java_sdk_path = \"${JAVA_HOME}\"" \
            "export/android/android_sdk_path = \"${ANDROID_HOME:-/usr/local/lib/android/sdk}\"" \
            "export/android/debug_keystore = \"$HOME/.android/debug.keystore\"" \
            'export/android/debug_keystore_user = "androiddebugkey"' \
            'export/android/debug_keystore_pass = "android"' \
            > ~/.config/godot/editor_settings-4.tres

      - name: Prepare project for headless export
        run: |
          python3 - << 'PYEOF'
          import re, os
          home = os.environ.get('HOME', os.path.expanduser('~'))
          keystore = f'{home}/.android/debug.keystore'

          # Remove editor plugins de dev (godot_mcp_enhanced sobe servidor HTTP).
          # Se usar plugins nativos (share, notificações...), mantenha-os na
          # PackedStringArray abaixo — os export plugins injetam AAR/manifest
          with open('godot/project.godot') as f:
              project = f.read()
          project = re.sub(
              r'^(enabled\s*=\s*)PackedStringArray\([^)]*\)',
              r'\1PackedStringArray()',  # plugins nativos com export plugin: liste aqui
              project,
              flags=re.MULTILINE
          )
          with open('godot/project.godot', 'w') as f:
              f.write(project)
          print('Editor plugins de dev removidos')

          with open('godot/export_presets.cfg') as f:
              presets = f.read()

          # Embed keystore path directly in the preset so the exporter finds
          # it even when editor settings are not read in headless mode
          presets = presets.replace('keystore/debug=""', f'keystore/debug="{keystore}"')
          presets = presets.replace('keystore/debug_user=""', 'keystore/debug_user="androiddebugkey"')
          presets = presets.replace('keystore/debug_password=""', 'keystore/debug_password="android"')

          # Keystore de release (via GitHub Secrets) quando configurada
          if os.environ.get('HAS_RELEASE_KS') == 'true':
              rel_ks = f'{home}/.android/release.keystore'
              rel_user = os.environ.get('ANDROID_KEYSTORE_USER', '')
              rel_pass = os.environ.get('ANDROID_KEYSTORE_PASS', '')
              presets = presets.replace('keystore/release=""', f'keystore/release="{rel_ks}"')
              presets = presets.replace('keystore/release_user=""', f'keystore/release_user="{rel_user}"')
              presets = presets.replace('keystore/release_password=""', f'keystore/release_password="{rel_pass}"')
              print('Release keystore configurada no preset')

          # Versão sincronizada com a tag da release (nome) e run_number (code)
          version_name = os.environ.get('VERSION_NAME', '1.0')
          version_code = os.environ.get('VERSION_CODE', '1')
          presets = re.sub(r'version/code=\d+', f'version/code={version_code}', presets)
          presets = re.sub(r'version/name="[^"]*"', f'version/name="{version_name}"', presets)
          print(f'Android version: {version_name} (code {version_code})')

          # Apple team IDs must be exactly 10 alphanumeric chars — ensure a
          # valid placeholder is set so Godot does not abort while validating
          # ALL presets (including iOS) during the Android export session
          presets = re.sub(
              r'application/app_store_team_id="[^"]*"',
              'application/app_store_team_id="ABCDE12345"',
              presets
          )

          # runnable=false prevents Godot from probing ADB for live devices
          presets = re.sub(r'runnable=true', 'runnable=false', presets)

          with open('godot/export_presets.cfg', 'w') as f:
              f.write(presets)
          print('Keystore embedded, iOS team ID set, runnable disabled')
          PYEOF

      - name: Install Android build template (gradle)
        run: |
          # use_gradle_build=true exige o template de build no projeto
          mkdir -p godot/android/build
          unzip -q \
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/android_source.zip \
            -d godot/android/build
          echo "${{ env.GODOT_VERSION }}.stable" > godot/android/.build_version
          # Sem .gdignore o Godot escaneia o template e cria sidecars .import
          # dentro de res/ (ex.: icon.webp.import), quebrando o resource
          # merger do gradle no segundo export (AAB após APK)
          touch godot/android/build/.gdignore

      - name: Export Android APK
        run: |
          mkdir -p build/android
          if [ "$HAS_RELEASE_KS" = "true" ]; then
            echo "Exportando APK RELEASE (assinado)"
            ~/.local/bin/godot --headless --path godot \
              --export-release "Android" ../build/android/game.apk
          else
            echo "Exportando APK DEBUG (secrets ANDROID_KEYSTORE_* ausentes)"
            ~/.local/bin/godot --headless --path godot \
              --export-debug "Android" ../build/android/game.apk
          fi

      - name: Export Android AAB (Play Store)
        run: |
          if [ "$HAS_RELEASE_KS" = "true" ]; then
            echo "Exportando AAB RELEASE (assinado)"
            ~/.local/bin/godot --headless --path godot \
              --export-release "Android AAB" ../build/android/game.aab
          else
            echo "Exportando AAB DEBUG (secrets ANDROID_KEYSTORE_* ausentes)"
            ~/.local/bin/godot --headless --path godot \
              --export-debug "Android AAB" ../build/android/game.aab
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/game.apk
          if-no-files-found: error

      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/android/game.aab
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # iOS — macOS runner
  # ─────────────────────────────────────────────
  build-ios:
    name: 🍎 Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /Applications/Godot.app
            ~/Library/Application Support/Godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-${{ env.GODOT_VERSION }}-stable-macos

      - name: Download Godot ${{ env.GODOT_VERSION }} (macOS)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_macos.universal.zip" \
            -O /tmp/godot.zip
          unzip /tmp/godot.zip -d /tmp/godot-macos
          sudo mv "/tmp/godot-macos/Godot.app" /Applications/Godot.app
          sudo xattr -rd com.apple.quarantine /Applications/Godot.app || true

      - name: Download Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" \
            -O /tmp/export_templates.tpz
          unzip /tmp/export_templates.tpz -d /tmp/export_templates_extracted
          mv /tmp/export_templates_extracted/templates/* \
            "$HOME/Library/Application Support/Godot/export_templates/${{ env.GODOT_VERSION }}.stable/"

      - name: Prepare project for headless export
        run: |
          python3 - << 'PYEOF'
          import re

          # Remove editor plugins de dev. Se usar plugins nativos, mantenha-os
          # na PackedStringArray — export plugins adicionam frameworks no Xcode
          with open('godot/project.godot') as f:
              project = f.read()
          project = re.sub(
              r'^(enabled\s*=\s*)PackedStringArray\([^)]*\)',
              r'\1PackedStringArray()',  # plugins nativos com export plugin: liste aqui
              project,
              flags=re.MULTILINE
          )
          with open('godot/project.godot', 'w') as f:
              f.write(project)
          print('Editor plugins de dev removidos')

          with open('godot/export_presets.cfg') as f:
              presets = f.read()

          # Apple team IDs must be exactly 10 alphanumeric chars; Godot 4.6
          # validates the length and rejects any value that is not 10 chars
          presets = re.sub(
              r'application/app_store_team_id="[^"]*"',
              'application/app_store_team_id="ABCDE12345"',
              presets
          )

          # runnable=false prevents Godot from probing ADB/devices during export
          presets = re.sub(r'runnable=true', 'runnable=false', presets)

          with open('godot/export_presets.cfg', 'w') as f:
              f.write(presets)
          print('iOS team ID set, runnable disabled')
          PYEOF

      - name: Export iOS Xcode project (debug)
        run: |
          mkdir -p build/ios
          /Applications/Godot.app/Contents/MacOS/Godot --headless --path godot \
            --export-debug "iOS" ../build/ios/game.xcodeproj

      - name: Build unsigned debug IPA
        run: |
          set -o pipefail
          # Discover the scheme generated by Godot (read from .xcscheme file — avoids BSD sed issues)
          SCHEME=$(find build/ios/game.xcodeproj/xcshareddata/xcschemes -name "*.xcscheme" \
            | head -1 | xargs basename | sed 's/\.xcscheme$//')
          echo "Scheme: $SCHEME"

          # Compile for iOS device (no signing required)
          xcodebuild \
            -project build/ios/game.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_BITCODE=NO \
            CONFIGURATION_BUILD_DIR="$(pwd)/build/ios/app" \
            build 2>&1 | tail -200

          # Package .app → unsigned IPA (Payload/*.app zipped)
          APP=$(find build/ios/app -maxdepth 1 -name "*.app" | head -1)
          echo "Packaging: $APP"
          mkdir -p build/ios/Payload
          cp -r "$APP" build/ios/Payload/
          (cd build/ios && zip -qr game.ipa Payload/)
          echo "IPA size: $(du -sh build/ios/game.ipa | cut -f1)"

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-ipa
          path: build/ios/game.ipa
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Windows — Ubuntu runner
  # ─────────────────────────────────────────────
  build-windows:
    name: 🪟 Build Windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/godot
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-${{ env.GODOT_VERSION }}-stable-linux

      - name: Download Godot ${{ env.GODOT_VERSION }} (Linux)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip /tmp/godot.zip -d /tmp/godot-bin
          mv "/tmp/godot-bin/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" ~/.local/bin/godot
          chmod +x ~/.local/bin/godot

      - name: Download Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" \
            -O /tmp/export_templates.tpz
          unzip /tmp/export_templates.tpz -d /tmp/export_templates_extracted
          mv /tmp/export_templates_extracted/templates/* \
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Prepare project for headless export
        run: |
          python3 - << 'PYEOF'
          import re

          # Remove ALL editor plugins (not needed for export builds)
          with open('godot/project.godot') as f:
              project = f.read()
          project = re.sub(
              r'^(enabled\s*=\s*)PackedStringArray\([^)]*\)',
              r'\1PackedStringArray()',
              project,
              flags=re.MULTILINE
          )
          with open('godot/project.godot', 'w') as f:
              f.write(project)
          print('All editor plugins cleared')

          with open('godot/export_presets.cfg') as f:
              presets = f.read()

          # Ensure iOS team ID is a valid 10-char placeholder so Godot does
          # not throw configuration errors when it validates ALL presets
          presets = re.sub(
              r'application/app_store_team_id="[^"]*"',
              'application/app_store_team_id="ABCDE12345"',
              presets
          )

          # runnable=false prevents Godot from probing ADB/devices during export
          presets = re.sub(r'runnable=true', 'runnable=false', presets)

          with open('godot/export_presets.cfg', 'w') as f:
              f.write(presets)
          print('iOS team ID set, runnable disabled')
          PYEOF

      - name: Export Windows EXE
        run: |
          mkdir -p build/windows
          ~/.local/bin/godot --headless --path godot \
            --export-release "Windows Desktop" ../build/windows/game.exe

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-exe
          path: build/windows/game.exe
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Linux AppImage — Ubuntu runner
  # ─────────────────────────────────────────────
  build-linux:
    name: 🐧 Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/godot
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-${{ env.GODOT_VERSION }}-stable-linux

      - name: Download Godot ${{ env.GODOT_VERSION }} (Linux)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip /tmp/godot.zip -d /tmp/godot-bin
          mv "/tmp/godot-bin/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" ~/.local/bin/godot
          chmod +x ~/.local/bin/godot

      - name: Download Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" \
            -O /tmp/export_templates.tpz
          unzip /tmp/export_templates.tpz -d /tmp/export_templates_extracted
          mv /tmp/export_templates_extracted/templates/* \
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Prepare project for headless export
        run: |
          python3 - << 'PYEOF'
          import re

          # Remove ALL editor plugins (not needed for export builds)
          with open('godot/project.godot') as f:
              project = f.read()
          project = re.sub(
              r'^(enabled\s*=\s*)PackedStringArray\([^)]*\)',
              r'\1PackedStringArray()',
              project,
              flags=re.MULTILINE
          )
          with open('godot/project.godot', 'w') as f:
              f.write(project)
          print('All editor plugins cleared')

          with open('godot/export_presets.cfg') as f:
              presets = f.read()

          # Ensure iOS team ID is a valid 10-char placeholder so Godot does
          # not throw configuration errors when it validates ALL presets
          presets = re.sub(
              r'application/app_store_team_id="[^"]*"',
              'application/app_store_team_id="ABCDE12345"',
              presets
          )

          # runnable=false prevents Godot from probing ADB/devices during export
          presets = re.sub(r'runnable=true', 'runnable=false', presets)

          with open('godot/export_presets.cfg', 'w') as f:
              f.write(presets)
          print('iOS team ID set, runnable disabled')
          PYEOF

      - name: Export Linux binary
        run: |
          mkdir -p build/linux
          ~/.local/bin/godot --headless --path godot \
            --export-release "Linux" ../build/linux/game.x86_64
          chmod +x build/linux/game.x86_64

      - name: Package as AppImage
        run: |
          # Download appimagetool (itself an AppImage)
          wget -q \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          # Build AppDir structure
          mkdir -p AppDir
          cp build/linux/game.x86_64 AppDir/
          cp godot/assets/icon.png AppDir/icon.png

          # AppRun — entry point executed when the AppImage is launched
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/game.x86_64" "$@"\n' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun

          # Desktop entry required by the AppImage specification
          printf '[Desktop Entry]\nType=Application\nName=GameTemplate\nExec=game.x86_64\nIcon=icon\nCategories=Game;\n' \
            > AppDir/game.desktop

          # APPIMAGE_EXTRACT_AND_RUN=1 lets appimagetool run without FUSE
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool \
            AppDir/ build/game.AppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: build/game.AppImage
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Web — Ubuntu runner (zip pronto para itch.io / hospedagem)
  # ─────────────────────────────────────────────
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/bin/godot
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-${{ env.GODOT_VERSION }}-stable-linux

      - name: Download Godot ${{ env.GODOT_VERSION }} (Linux)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip /tmp/godot.zip -d /tmp/godot-bin
          mv "/tmp/godot-bin/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" ~/.local/bin/godot
          chmod +x ~/.local/bin/godot

      - name: Download Godot export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" \
            -O /tmp/export_templates.tpz
          unzip /tmp/export_templates.tpz -d /tmp/export_templates_extracted
          mv /tmp/export_templates_extracted/templates/* \
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Prepare project for headless export
        run: |
          python3 - << 'PYEOF'
          import re

          # Remove ALL editor plugins (not needed for export builds)
          with open('godot/project.godot') as f:
              project = f.read()
          project = re.sub(
              r'^(enabled\s*=\s*)PackedStringArray\([^)]*\)',
              r'\1PackedStringArray()',
              project,
              flags=re.MULTILINE
          )
          with open('godot/project.godot', 'w') as f:
              f.write(project)

          with open('godot/export_presets.cfg') as f:
              presets = f.read()
          presets = re.sub(
              r'application/app_store_team_id="[^"]*"',
              'application/app_store_team_id="ABCDE12345"',
              presets
          )
          presets = re.sub(r'runnable=true', 'runnable=false', presets)
          with open('godot/export_presets.cfg', 'w') as f:
              f.write(presets)
          print('Prepared for web export')
          PYEOF

      - name: Export Web build
        run: |
          mkdir -p build/web
          ~/.local/bin/godot --headless --path godot \
            --export-release "Web" ../build/web/index.html
          (cd build/web && zip -qr ../game-web.zip .)
          echo "Web zip: $(du -sh build/game-web.zip | cut -f1)"

      - name: Upload Web zip
        uses: actions/upload-artifact@v4
        with:
          name: web-zip
          path: build/game-web.zip
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Release — create GitHub release with all artifacts
  # ─────────────────────────────────────────────
  release:
    name: 📦 Create Release
    needs: [version, build-android, build-ios, build-windows, build-linux, build-web]
    # Só publica release a partir da main — dispatch em branch serve para
    # validar os builds sem criar release/tag
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            release-artifacts/android-apk/game.apk
            release-artifacts/android-aab/game.aab
            release-artifacts/ios-debug-ipa/game.ipa
            release-artifacts/windows-release-exe/game.exe
            release-artifacts/linux-appimage/game.AppImage
            release-artifacts/web-zip/game-web.zip
