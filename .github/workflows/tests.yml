name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Unit tests — GUT (invariantes do gameplay)
  # ─────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests (GUT)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}-stable-linux-headless

      - name: Download Godot ${{ env.GODOT_VERSION }} (Linux)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip /tmp/godot.zip -d /tmp/godot-bin
          mv "/tmp/godot-bin/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" ~/.local/bin/godot
          chmod +x ~/.local/bin/godot

      - name: Prepare project for headless run
        run: |
          # Editor plugins não são necessários e podem interferir
          # (godot_mcp_enhanced abre um servidor HTTP no editor)
          sed -i 's/^enabled=PackedStringArray(.*)$/enabled=PackedStringArray()/' godot/project.godot

      - name: Import resources
        run: |
          ~/.local/bin/godot --headless --import --path godot || true

      - name: Run GUT tests
        run: |
          ~/.local/bin/godot --headless --path godot \
            -s res://addons/gut/gut_cmdln.gd -gexit

  # ─────────────────────────────────────────────
  # Stress test — N ciclos de jogo com AutoplayBot
  # (o bot do template navega pelos botões; sobrescreva _act() no seu jogo)
  # ─────────────────────────────────────────────
  stress-test:
    name: 🤖 Stress Test (autoplay)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}-stable-linux-headless

      - name: Download Godot ${{ env.GODOT_VERSION }} (Linux)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip /tmp/godot.zip -d /tmp/godot-bin
          mv "/tmp/godot-bin/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" ~/.local/bin/godot
          chmod +x ~/.local/bin/godot

      - name: Prepare project for headless run
        run: |
          sed -i 's/^enabled=PackedStringArray(.*)$/enabled=PackedStringArray()/' godot/project.godot

      - name: Import resources
        run: |
          ~/.local/bin/godot --headless --import --path godot || true

      - name: Run 20-cycle autoplay stress test
        run: |
          ~/.local/bin/godot --headless --path godot \
            -- --autoplay 20 8 \
            2>&1 | tee stress.log

      - name: Verify stress test results
        run: |
          python3 - << 'PYEOF'
          import json, re, sys

          with open('stress.log') as f:
              log = f.read()

          match = re.search(r'RESULTS_JSON: (\{.*\})', log)
          if not match:
              sys.exit('RESULTS_JSON não encontrado no log — o teste não terminou')

          stats = json.loads(match.group(1))
          games = stats['games']
          timeouts = stats['summary']['timeouts']

          print(f"games={games} timeouts={timeouts} avg={stats['summary']['avg_seconds']}s")

          assert games == 20, f'esperava 20 ciclos, obteve {games}'
          assert timeouts == 0, f'{timeouts} ciclos travaram (timeout)'
          assert 'SCRIPT ERROR' not in log, 'erros de script durante o stress test'
          print('Stress test OK')
          PYEOF

      - name: Upload stress test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-log
          path: stress.log
          if-no-files-found: ignore
